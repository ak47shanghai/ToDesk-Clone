<!DOCTYPE html>
<html lang="zh-CN">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>ToDesk Clone</title>

    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/sidebar.css">
    <link rel="stylesheet" href="css/header.css">
    <link rel="stylesheet" href="css/card.css">
    <link rel="stylesheet" href="css/banner.css">
    <link rel="stylesheet" href="css/animation.css">
    <link rel="stylesheet" href="css/responsive.css">

</head>

<body>

<div class="app">

    <!-- 左侧 -->
    <aside class="sidebar">

        <div class="version">
            V4.9.7.1
        </div>

        <div class="profile">

            <div class="avatar">

            </div>

            <div class="nickname">
                出客
            </div>

            <div class="vip-group">

                <span class="vip-tag free">
                    个人版
                </span>

                <span class="vip-tag pro">
                    升级
                </span>

            </div>

        </div>

        <div class="switch-panel">

            <button>切换旧版</button>

            <button>个人中心</button>

        </div>

        <nav class="menu">

            <div class="menu-item active">

                <span class="icon"></span>

                <span>主页</span>

            </div>

            <div class="menu-item">

                <span class="icon"></span>

                <span>设备列表</span>

            </div>

            <div class="menu-item">

                <span class="icon"></span>

                <span>屏幕墙</span>

            </div>

            <div class="menu-item">

                <span class="icon"></span>

                <span>高级设置</span>

            </div>

        </nav>

        <div class="sidebar-bottom">

            <div class="ad-card">

                广告区域

            </div>

            <div class="logo">

                ToDesk

            </div>

        </div>

    </aside>

    <!-- 右侧 -->

    <div class="content">

       <header class="header">

    <div class="header-left">

        <div class="scene-title">
            通用场景
            <span class="arrow">⌄</span>
        </div>

    </div>

    <div class="header-right">

        <a href="#" class="old-version">返回旧版</a>

        <button class="quick-start">
            📖
            <span>快速上手</span>
        </button>

        <button class="header-icon">?</button>

        <button class="header-icon">🔒</button>

        <button class="header-icon">📱</button>

        <button class="header-icon">🔔</button>

        <button class="header-icon">☰</button>

        <button class="window-btn">—</button>

        <button class="window-btn close">✕</button>

    </div>

</header>

        <main class="main">

    <section class="toolbar">

        <button class="tool-btn active">

            <span class="tool-icon">🖥</span>

            远程控制

        </button>

        <button class="tool-btn">

            <span class="tool-icon">📺</span>

            投屏演示

        </button>

        <button class="tool-btn">

            <span class="tool-icon">📁</span>

            互传文件

        </button>

        <button class="tool-btn">

            <span class="tool-icon">⬚</span>

            应用中心

        </button>

        <button class="tool-btn">

            <span class="tool-icon">⚙</span>

            快速设置

        </button>

    </section>

</main>

        </main>

    </div>

</div>

</body>

</html>
